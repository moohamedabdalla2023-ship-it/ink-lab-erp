<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches — INK LAB ERP V2</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6393ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>

<body>

    <div class="bg-grid"></div>
    <div class="scanline"></div>

    <header>
        <div class="logo-wrap">
            <div class="logo-icon">⬡</div>
            <div>
                <h1>INK LAB</h1>
                <span class="subtitle">ERP SYSTEM V2</span>
            </div>
        </div>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="formulas.html">Formulas</a>
            <a href="batches.html" class="active">Batches</a>
            <a href="stock.html">Stock</a>
            <a href="drums.html">Drums</a>
        </nav>
        <div class="header-right">
            <div class="status-bar">
                <span class="dot"></span>
                <span id="clock">--:--:--</span>
            </div>
        </div>
    </header>

    <main>
        <div class="page-title">▶ <span>Batches</span> — PRODUCTION LOG</div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-label">TOTAL Batches</div>
                <div class="stat-value" id="stat-total">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-label">PENDING</div>
                <div class="stat-value" id="stat-pending" style="color:var(--warn)">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚙️</div>
                <div class="stat-label">IN PRODUCTION</div>
                <div class="stat-value" id="stat-inprod" style="color:var(--accent)">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-label">DONE</div>
                <div class="stat-value" id="stat-done" style="color:var(--green)">—</div>
            </div>
        </div>

        <!-- ADD BATCH -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">▶ NEW BATCH</span>
                <button class="btn btn-ghost" onclick="toggleForm()" id="toggle-btn">+ ADD BATCH</button>
            </div>
            <div id="batch-form" style="display:none">
                <div class="panel-body">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>BATCH NO *</label>
                            <input id="b-batch_no" placeholder="e.g. BCH-2024-001" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>FORMULA</label>
                            <select id="b-formula_id">
                                <option value="">— SELECT FORMULA —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>TARGET KG *</label>
                            <input id="b-target_kg" type="number" placeholder="e.g. 20" min="0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>RETURNED KG (after run)</label>
                            <input id="b-returned_kg" type="number" placeholder="0" min="0" step="0.1" value="0">
                        </div>
                        <div class="form-group">
                            <label>STATUS</label>
                            <select id="b-status">
                                <option value="pending">PENDING</option>
                                <option value="in_production">IN PRODUCTION</option>
                                <option value="done">DONE</option>
                                <option value="cancelled">CANCELLED</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>NOTES</label>
                            <input id="b-notes" placeholder="Optional notes">
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-primary" onclick="saveBatch()">💾 SAVE BATCH</button>
                        <button class="btn btn-ghost" onclick="resetForm()">✕ CLEAR</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BATCH LIST -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">▶ BATCH LOG</span>
                <button class="btn btn-ghost" onclick="loadBatches()" style="font-size:0.65rem;padding:6px 14px;">↺
                    REFRESH</button>
            </div>
            <div class="panel-body" style="padding-bottom:0">
                <div class="search-bar">
                    <input id="search-input" placeholder="SEARCH BY BATCH NO OR FORMULA..." oninput="filterBatches()">
                    <select id="filter-status" onchange="filterBatches()" class="search-bar" style="min-width:140px">
                        <option value="">ALL STATUS</option>
                        <option value="pending">PENDING</option>
                        <option value="in_production">IN PRODUCTION</option>
                        <option value="done">DONE</option>
                        <option value="cancelled">CANCELLED</option>
                    </select>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>BATCH NO</th>
                            <th>FORMULA</th>
                            <th>TARGET KG</th>
                            <th>RETURNED KG</th>
                            <th>NET KG</th>
                            <th>STATUS</th>
                            <th>DATE</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="batches-tbody">
                        <tr class="empty-row">
                            <td colspan="8">LOADING...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <!-- VIEW MODAL -->
    <div class="modal-overlay" id="view-modal">
        <div class="modal" style="max-width:650px">
            <div class="modal-header">
                <span class="modal-title" id="modal-batch-title">BATCH DETAILS</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- EDIT RETURNED KG MODAL -->
    <div class="modal-overlay" id="return-modal">
        <div class="modal" style="max-width:400px">
            <div class="modal-header">
                <span class="modal-title">UPDATE RETURNED KG</span>
                <button class="modal-close" onclick="closeReturnModal()">✕</button>
            </div>
            <div class="panel-body" style="padding:0">
                <div class="form-group" style="margin-bottom:16px">
                    <label>BATCH NO</label>
                    <input id="ret-batch-no" disabled style="opacity:0.5">
                </div>
                <div class="form-group" style="margin-bottom:20px">
                    <label>RETURNED KG FROM MACHINE</label>
                    <input id="ret-kg" type="number" min="0" step="0.1" placeholder="0">
                </div>
                <div class="btn-row" style="margin-top:0">
                    <button class="btn btn-primary" onclick="saveReturned()">💾 SAVE</button>
                    <button class="btn btn-ghost" onclick="closeReturnModal()">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="pdf.js"></script>
    <script src="batches.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>

</html>
