<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches — INK LAB ERP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6393ff">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- Required for PDF / QR / barcode export — must load before batches.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="bg-grid"></div>

    <header>
        <a class="logo-wrap" href="index.html" style="text-decoration:none">
            <div class="logo-icon">⬡</div>
            <div>
                <h1>INK LAB</h1>
                <span class="subtitle">ERP SYSTEM V2</span>
            </div>
        </a>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="formulas.html">Formulas</a>
            <a href="batches.html" class="active">Batches</a>
            <a href="stock.html">Stock</a>
        </nav>
        <div class="header-right">
            <div class="status-bar">
                <span class="dot"></span>
                <span id="clock">--:--:--</span>
            </div>
        </div>
    </header>

    <main>

        <div class="page-title"><span>Batches</span></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-label">Total Batches</div>
                <div class="stat-value" id="stat-total">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="stat-pending">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚙️</div>
                <div class="stat-label">In Production</div>
                <div class="stat-value" id="stat-inprod">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-label">Done</div>
                <div class="stat-value" id="stat-done">—</div>
            </div>
        </div>

        <!-- ADD BATCH -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Add New Batch</span>
                <button class="btn btn-primary" id="toggle-btn" onclick="toggleForm()">+ ADD BATCH</button>
            </div>

            <div id="batch-form" style="display:none">
                <div class="panel-body">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Batch No *</label>
                            <input id="b-batch_no" placeholder="e.g. PMS485-001" autocomplete="off">
                        </div>

                        <div class="form-group">
                            <label>Formula</label>
                            <select id="b-formula_id">
                                <option value="">— Select formula —</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Target KG *</label>
                            <input id="b-target_kg" type="number" min="0" step="0.1" placeholder="e.g. 20">
                        </div>

                        <div class="form-group">
                            <label>Returned KG</label>
                            <input id="b-returned_kg" type="number" min="0" step="0.1" value="0">
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select id="b-status">
                                <option value="pending">Pending</option>
                                <option value="in_production">In Production</option>
                                <option value="done">Done</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Notes</label>
                            <input id="b-notes" placeholder="Optional notes">
                        </div>
                    </div>

                    <div class="btn-row" style="margin-top:20px">
                        <button class="btn btn-primary" onclick="saveBatch()">💾 Save Batch</button>
                        <button class="btn btn-ghost" onclick="resetForm()">Clear</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- ARCHIVE -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Batch Archive</span>
                <button class="btn btn-ghost" onclick="loadBatches()">↺ Refresh</button>
            </div>

            <div style="padding:16px 20px 0;display:flex;gap:10px;flex-wrap:wrap">
                <div class="search-bar" style="flex:1;min-width:200px">
                    <input id="search-input" placeholder="Search by batch no or formula..." oninput="filterBatches()">
                </div>
                <select id="filter-status" onchange="filterBatches()" style="min-width:160px">
                    <option value="">All statuses</option>
                    <option value="pending">Pending</option>
                    <option value="in_production">In Production</option>
                    <option value="done">Done</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Batch No</th>
                            <th>Formula</th>
                            <th>Target</th>
                            <th>Returned</th>
                            <th>Net</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="batches-tbody">
                        <tr class="empty-row">
                            <td colspan="8">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <!-- VIEW MODAL -->
    <div class="modal-overlay" id="view-modal" onclick="handleOverlayClick(event)">
        <div class="modal" style="max-width:700px">
            <div class="modal-header">
                <span class="modal-title" id="modal-batch-title">Batch Details</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- RETURN MODAL -->
    <div class="modal-overlay" id="return-modal">
        <div class="modal" style="max-width:420px">
            <div class="modal-header">
                <span class="modal-title">Update Returned KG</span>
                <button class="modal-close" onclick="closeReturnModal()">✕</button>
            </div>
            <div style="padding:20px">
                <div class="form-group" style="margin-bottom:12px">
                    <label>Batch No</label>
                    <input id="ret-batch-no" disabled>
                </div>
                <div class="form-group">
                    <label>Returned KG</label>
                    <input id="ret-kg" type="number" min="0" step="0.1">
                </div>
                <div class="btn-row" style="margin-top:18px">
                    <button class="btn btn-primary" onclick="saveReturned()">💾 Save</button>
                    <button class="btn btn-ghost" onclick="closeReturnModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="batches.js?v=2"></script>
    <script>
        function handleOverlayClick(e) {
            if (e.target === document.getElementById("view-modal")) closeModal();
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.unregister())).catch(() => { });
        }
        if ('caches' in window) {
            caches.keys().then(keys => keys.forEach(key => caches.delete(key))).catch(() => { });
        }
    </script>
</body>

</html>
